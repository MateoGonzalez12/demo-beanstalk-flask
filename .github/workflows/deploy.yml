name: Deploy Flask to Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: zip -r app.zip application.py requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload package to S3
        run: aws s3 cp app.zip s3://demo-beanstalk-act/app-${{ github.run_number }}.zip

      - name: Create new Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name demo-env \
            --version-label v-${{ github.run_number }} \
            --source-bundle S3Bucket=demo-beanstalk-act,S3Key=app-${{ github.run_number }}.zip

      - name: Deploy to Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name Webserverenvironment-env \
            --version-label v-${{ github.run_number }}
